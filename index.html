<!DOCTYPE html>
<html lang="ku">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سایتی من</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
      text-align: center;
    }

    header {
      background: #1e3a8a;
      color: white;
      padding: 20px;
    }

    nav {
      background: #2563eb;
      padding: 10px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 10px;
      font-weight: bold;
    }

    .container {
      padding: 40px 20px;
    }

    button {
      background: #1e3a8a;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #163172;
    }

    footer {
      margin-top: 40px;
      background: #ddd;
      padding: 15px;
    }
  </style>
</head>
<body>

  <header>
    <h1>بەخێربێیت بۆ سایتی من</h1>
    <p>ئەمە سەرەتای دروستکردنی سایتە</p>
  </header>

  <nav>
    <a href="#">سەرەکی</a>
    <a href="#">دەربارە</a>
    <a href="#">پەیوەندی</a>
  </nav>

  <div class="container">
    <h2>سڵاو!</h2>
    <p>ئەم سایتە بە HTML و CSS و JavaScript دروست کراوە.</p>
    <button onclick="showMessage()">کرتە بکە</button>
    <p id="message"></p>
  </div>

  <footer>
    <p>© 2026 سایتی من - هەموو مافەکان پارێزراون</p>
  </footer>

  <script>
    function showMessage() {
      document.getElementById("message").innerText = "بەخێربێیت! دوگمەکە کار کرد.";
    }
  </script>

</body>
</html>
